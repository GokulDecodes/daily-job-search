name: Daily Job Search

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST every day
  workflow_dispatch:        # manual trigger anytime

jobs:
  run-job-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests beautifulsoup4

      - name: Run job search script
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_search_daily.py

      - name: Save job history back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen_jobs.json job_listing/ || true
          git diff --staged --quiet || git commit -m "Daily job update $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: job-listings-${{ github.run_number }}
          path: |
            job_listing/job_listing_*.csv
            job_listing/job_listing_*.xlsx
