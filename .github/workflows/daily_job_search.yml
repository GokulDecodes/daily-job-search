name: Daily Job Search

on:
  schedule:
    - cron: '30 3 * * *'  # 9:00 AM IST every day
  workflow_dispatch:        # Manual trigger button

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-job-search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl requests beautifulsoup4

      - name: Run job search script
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_search_daily.py

      - name: Show generated files
        run: |
          echo "=== Current Directory ==="
          pwd
          echo "=== All Files ==="
          ls -la
          echo "=== CSV Files ==="
          find . -name "*.csv" 2>/dev/null || echo "No CSV files found"
          echo "=== XLSX Files ==="
          find . -name "*.xlsx" 2>/dev/null || echo "No XLSX files found"

      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: job-listings-${{ github.run_number }}
          path: |
            job_listing_*.csv
            job_listing_*.xlsx
          if-no-files-found: warn
